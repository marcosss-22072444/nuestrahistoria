<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        body { 
            background-color: #e6699c; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 10px;
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PANTALLA DE BLOQUEO */
        #bloqueo {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #e6699c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
        }

        #bloqueo input {
            padding: 15px;
            font-size: 1.2em;
            border-radius: 15px;
            border: 2px solid white;
            outline: none;
            text-align: center;
            margin-top: 20px;
            color: #e6699c;
            font-weight: bold;
            width: 200px;
        }

        #btnEntrar {
            margin-top: 15px;
            padding: 10px 25px;
            background: white;
            color: #e6699c;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* CONTENIDO PRINCIPAL */
        #miGaleria { 
            display: none; 
            width: 100%; 
            flex-direction: column; 
            align-items: center; 
        }

        h1 { 
            color: white; 
            font-size: clamp(1.5em, 7vw, 2.5em);
            margin: 40px 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            width: 100%;
            max-width: 1200px;
            margin-bottom: 50px;
        }

        figure {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 280px; 
            margin: 0;
            cursor: pointer;
            position: relative;
            animation: flotarTodo 5s infinite ease-in-out;
            transition: transform 0.2s ease;
            box-sizing: border-box;
            flex: 0 0 280px;
        }

        figure:nth-child(n) { animation-delay: calc(0.5s * var(--i)); }

        @keyframes flotarTodo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        figure:active { transform: scale(0.95); }

        img { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 1 / 1; 
            object-fit: cover; 
            border-radius: 18px;
            display: block;
        }

        figcaption {
            margin-top: 15px;
            font-weight: 600;
            color: #e6699c; 
            font-size: 1.1em;
        }
