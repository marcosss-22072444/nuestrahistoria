<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        body { 
            background-color: #e6699c; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 10px;
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PANTALLAS DE BLOQUEO Y MENSAJE */
        #bloqueo, #mensajeIntermedio {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #e6699c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
        }

        #mensajeIntermedio { display: none; }

        input {
            padding: 15px;
            font-size: 1.2em;
            border-radius: 15px;
            border: 2px solid white;
            outline: none;
            text-align: center;
            margin-top: 20px;
            color: #e6699c;
            font-weight: bold;
        }

        .btn-romantico {
            margin-top: 25px;
            padding: 15px 30px;
            background-color: white;
            color: #e6699c;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .btn-romantico:active { transform: scale(0.9); }

        /* CONTENIDO PRINCIPAL */
        .contenido { display: none; width: 100%; flex-direction: column; align-items: center; }

        h1 { 
            color: white; 
            font-size: clamp(1.5em, 7vw, 2.5em);
            margin: 40px 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            width: 100%;
            max-width: 1200px;
            margin-bottom: 50px;
        }

        figure {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 280px; 
            margin: 0;
            cursor: pointer;
            position: relative;
            animation: flotarTodo 5s infinite ease-in-out;
            transition: transform 0.2s ease;
            box-sizing: border-box;
            flex: 0 0 280px;
        }

        figure:nth-child(n) { animation-delay: calc(0.5s * var(--i, 1)); }

        @keyframes flotarTodo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; display: block; }

        figcaption { margin-top: 15px; font-weight: 600; color: #e6699c; font-size: 1.1em; }

        .heart-spark {
            position: absolute;
            pointer-events: none;
            animation: fadeUp 0.6s forwards;
            color: white; 
            font-size: 30px;
            z-index: 1000;
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120px) scale(1.5); }
        }

        @media (max-width: 600px) { figure { flex: 0 0 90%; } }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h2>🤍 Contraseña 🤍</h2>
        <input type="password" id="pass" placeholder="Nuestra fecha..." oninput="validar()" maxlength="6">
    </div>

    <div id="mensajeIntermedio">
        <h2 style="line-height: 1.6;">esto es solo para ti....🤍</h2>
        <button class="btn-romantico" onclick="abrirTodo()">pulsa aqui si me quieres</button>
    </div>

    <div class="contenido" id="miGaleria">
        <h1>🤍 Nuestra Historia 🤍</h1>
        <div class="galeria">
            <figure style="--i:1" onclick="irUrl(event, 'https://photos.app.goo.gl/DKeySBjuzfcf59fYA')">
                <img src="foto1.jpg"><figcaption>Nuestra primera foto</figcaption>
            </figure>
            <figure style="--i:2" onclick="crearCorazon(event)">
                <img src="foto2.jpg"><figcaption>Nuestra historia (fotos)</figcaption>
            </figure>
            <figure style="--i:3" onclick="crearCorazon(event)">
                <img src="foto3.png"><figcaption>Nuestra historia (libro)</figcaption>
            </figure>
            <figure style="--i:4" onclick="irUrl(event, 'amor.html')">
                <img src="foto4.png"><figcaption>para ti amor mio</figcaption>
            </figure>
            <figure style="--i:5" onclick="irUrl(event, 'https://marcosss-22072444.github.io/Lasjordanmiamorteamoojaladurarparasiempre/')">
                <img src="foto5.png"><figcaption>Las jordan</figcaption>
            </figure>
        </div>
    </div>

    <script>
        function validar() {
            const input = document.getElementById('pass').value;
            if (input === '220724') {
                document.getElementById('bloqueo').style.display = 'none';
                document.getElementById('mensajeIntermedio').style.display = 'flex';
            }
        }

        function abrirTodo() {
            document.getElementById('mensajeIntermedio').style.display = 'none';
            document.getElementById('miGaleria').style.display = 'flex';
            window.scrollTo(0,0);
        }

        function irUrl(e, url) {
            crearCorazon(e);
            setTimeout(() => { window.location.href = url; }, 150);
        }

        function crearCorazon(e) {
            const heart = document.createElement('div');
            heart.className = 'heart-spark';
            heart.innerHTML = '🤍'; 
            const x = e.pageX || (e.touches && e.touches[0].pageX);
            const y = e.pageY || (e.touches && e.touches[0].pageY);
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 600);
        }
    </script>
</body>
</html>
