<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 🤍</title>
    <style>
        /* Definición de la fuente */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        /* Fondo y estilos globales */
        body { 
            background-color: #ffebee; /* Rosa más romántico y cálido */
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 20px;
            color: #444;
        }

        /* Título fijo y sin movimiento (congelado) */
        h1 { 
            color: #d81b60; 
            font-size: 2.5em;
            margin-top: 40px;
            margin-bottom: 50px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        /* Clase para los corazones blancos del título */
        .white-heart {
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Contenedor de la galería */
        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 30px; 
            margin-top: 20px;
        }

        /* Estilo general para todos los elementos (recuadros) */
        figure {
            background: #ffffff;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); /* Sombra inicial mínima */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 280px;
            margin: 0;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
        }

        /* Animación de movimiento flotante sutil y lento para los elementos */
        .flotar-sutil {
            animation: flotarSutil 8s infinite ease-in-out;
        }

        /* Efecto al pasar el ratón: se eleva sutilmente */
        figure:hover {
            transform: translateY(-5px) scale(1.02); /* Elevación mínima */
            box-shadow: 0 8px 20px rgba(216, 27, 96, 0.1);
        }

        /* Definición de la animación flotante suave */
        @keyframes flotarSutil {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); } /* Solo 3px de movimiento */
        }

        /* Estilo para las imágenes dentro de los recuadros */
        img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            border-radius: 15px;
        }

        /* Estilo para los títulos debajo de las imágenes */
        figcaption {
            margin-top: 15px;
            font-weight: 300;
            color: #d81b60;
            font-size: 1.1em;
            text-transform: capitalize;
        }

        /* Efecto de corazones al hacer clic (opcional) */
        .heart-spark {
            position: absolute;
            pointer-events: none;
            animation: fadeUp 0.8s forwards;
            color: #d81b60;
            font-size: 20px;
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100px) scale(1.5); }
        }
    </style>
</head>
<body>

    <h1><span class="white-heart">❤️</span> Nuestra Historia <span class="white-heart">❤️</span></h1>

    <div class="galeria">
        
        <figure class="flotar-sutil" onclick="crearCorazon(event)">
            <img src="foto1.jpg">
            <figcaption>Nuestra primera foto</figcaption>
        </figure>

        <figure class="flotar-sutil" style="animation-delay: 2s;" onclick="crearCorazon(event)">
            <img src="foto2.jpg">
            <figcaption>Nuestra historia (fotos)</figcaption>
        </figure>

        <figure class="flotar-sutil" style="animation-delay: 4s;" onclick="crearCorazon(event)">
            <img src="foto3.jpg">
            <figcaption>Nuestra historia (libro)</figcaption>
        </figure>

    </div>

    <script>
        function crearCorazon(e) {
            const heart = document.createElement('div');
            heart.className = 'heart-spark';
            heart.innerHTML = '❤️';
            heart.style.left = e.pageX + 'px';
            heart.style.top = e.pageY + 'px';
            heart.style.position = 'absolute';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 800);
        }
    </script>

</body>
</html>
